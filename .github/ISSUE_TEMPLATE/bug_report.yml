name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Include the profile/rule configuration that triggers the problem (Settings → Share → Copy JSON helps, but remove any sensitive header values first).
      placeholder: |
        1. Create a profile with rule …
        2. Visit …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Chrome 138
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Reheader version
      placeholder: e.g. 0.1.0
    validations:
      required: true
